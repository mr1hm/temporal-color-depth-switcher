name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
      prerelease:
        description: "Pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -ldflags "-H windowsgui -s -w" -o temporal-color-depth-switcher.exe .

      - name: Package
        run: Compress-Archive -Path temporal-color-depth-switcher.exe,config.json -DestinationPath temporal-color-depth-switcher.zip

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          artifacts: temporal-color-depth-switcher.zip
          prerelease: ${{ inputs.prerelease }}
          generateReleaseNotes: true
